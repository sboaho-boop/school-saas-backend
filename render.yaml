services:
  - type: web
    name: school-saas-backend
    env: node
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --accept-data-loss && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: school-saas-db
          property: connectionString
      - key: JWT_SECRET
        value: eduplatform-jwt-secret-change-in-production
      - key: PORT
        value: "4000"
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://school-saas-fawn.vercel.app"

databases:
  - name: school-saas-db
    databaseName: school_saas
    user: school_saas_user
    plan: free
